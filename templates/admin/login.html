{% extends "admin/base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="card login-card">
  <h1>Admin sign in</h1>
  <p class="muted">Authorized staff only. This area manages sensitive data.</p>
  <form method="post">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" class="text-input" autofocus autocomplete="current-password" required>
    <button class="btn btn-primary">Sign in</button>
  </form>
</div>
{% endblock %}
