{% extends "admin/base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:48px auto;">
  <h1>Admin sign in</h1>
  <p class="muted">Authorized staff only. This area manages sensitive data.</p>
  <form method="post" style="margin-top:18px;">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus autocomplete="current-password" required>
    <button class="btn" style="margin-top:16px; width:100%;">Sign in</button>
  </form>
</div>
{% endblock %}
